<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pour toi</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- LIB CONFETTI -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
      padding: 28px 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 1.9rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 25px;
    }

    .buttons {
      position: relative;
      height: 240px;
    }

    button {
      position: absolute;
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      cursor: pointer;
    }

    #yesBtn {
      left: 20%;
      top: 100px;
      background: #ff4d8d;
      color: white;
    }

    #noBtn {
      left: 60%;
      top: 100px;
      background: #eee;
    }

    .final-screen {
      display: none;
    }

    .final-screen h2 {
      color: #ff2f7d;
    }
  </style>
</head>
<body>

<div class="card">
  <div id="questionScreen">
    <h1>Est-ce que tu veux sortir avec moi ?</h1>
    <p class="subtitle">Réfléchis bien 😌</p>

    <div class="buttons" id="playArea">
      <button id="yesBtn">Oui</button>
      <button id="noBtn">Non</button>
    </div>
  </div>

  <div class="final-screen" id="finalScreen">
    <h2>Trop bien ❤️</h2>
    <p>Je t’écris très vite 😌</p>
  </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const playArea = document.getElementById("playArea");
const finalScreen = document.getElementById("finalScreen");
const questionScreen = document.getElementById("questionScreen");

const NTFY_TOPIC = "ayman-date-x7Kp92LmQ-heart-2026";

let noClickCount = 0;

function moveNoButton() {
  const rect = playArea.getBoundingClientRect();
  const maxX = rect.width - noBtn.offsetWidth;
  const maxY = rect.height - noBtn.offsetHeight;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
}

function shrinkNo() {
  noClickCount++;
  let scale = Math.max(0.2, 1 - noClickCount * 0.15);
  noBtn.style.transform = `scale(${scale})`;
}

noBtn.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  shrinkNo();
  moveNoButton();
});

yesBtn.addEventListener("click", async () => {

  // CONFETTI BURST
  confetti({
    particleCount: 120,
    spread: 70,
    origin: { y: 0.6 }
  });

  // CONFETTI CONTINU
  let duration = 2000;
  let end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 55,
      origin: { x: 0 }
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 55,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();

  // notif ntfy
  try {
    await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
      method: "POST",
      body: "Elle a cliqué sur Oui 🎉"
    });
  } catch (e) {}

  // transition écran
  setTimeout(() => {
    questionScreen.style.display = "none";
    finalScreen.style.display = "block";
  }, 800);
});
</script>

</body>
</html>
